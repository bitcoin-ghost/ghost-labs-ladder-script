name: Ladder Script CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libboost-dev libevent-dev libsqlite3-dev \
            python3 python3-pip nodejs
          pip3 install coincurve

      - name: Build ghostd
        run: |
          bash scripts/build.sh
        timeout-minutes: 30

      - name: Documentation accuracy tests
        run: python3 -m pytest tests/test_documentation_accuracy.py -v

      - name: Proxy unit tests
        run: python3 -m pytest proxy/test_proxy.py -v

      - name: Engine smoke tests
        run: node tests/engine_smoke.js

      - name: Regtest functional tests
        run: bash scripts/regtest-ci.sh
        timeout-minutes: 60
